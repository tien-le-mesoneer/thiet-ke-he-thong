# Podman-compatible compose file.
# Run with:  podman compose up -d      (Podman 4.7+)
# or:        podman-compose up -d      (pip install podman-compose)
services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: deliveroo-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: deliveroo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d deliveroo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
